name: verify-strict-real

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/**"
      - "vmd/**"
      - "portproxy/**"
      - "proto/**"
      - "scripts/**"
      - "deploy/integration/**"
      - "specs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/verify-strict-real.yml"
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "vmd/**"
      - "portproxy/**"
      - "proto/**"
      - "scripts/**"
      - "deploy/integration/**"
      - "specs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/verify-strict-real.yml"

concurrency:
  group: verify-strict-real-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-real:
    # Requires a self-hosted Linux runner with docker/docker compose and /dev/kvm.
    runs-on: [self-hosted, linux, x64, kvm]
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner capabilities
        run: |
          set -euo pipefail
          uname -a
          docker --version
          docker compose version || docker-compose --version
          test -e /dev/kvm

      - name: Run strict real gates
        run: |
          set -euo pipefail
          ./scripts/verify_strict_real.sh --profile ci-linux-kvm --mock-preflight-strict
